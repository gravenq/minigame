function analyzeDiary(text) {
  const rules = [
    {kw:["学习","上课","读书","看书","编程","代码","研究","论文","课程","知识","算法","英语","安装","教程","技术"],attr:"INT",base:1},
    {kw:["勇气","演讲","发言","面试","挑战","克服","鼓起勇气","第一次","尝试","主动","上台","表演","脱口秀"],attr:"COU",base:2},
    {kw:["运动","跑步","健身","游泳","爬山","骑车","瑜伽","打球","早起","锻炼","散步","公里","俯卧撑"],attr:"VIT",base:1},
    {kw:["画画","写作","创作","设计","做饭","摄影","音乐","弹琴","手工","烘焙","拍照","水彩","唱歌","视频"],attr:"CRE",base:1},
    {kw:["朋友","聚会","聚餐","团队","合作","帮助","约会","同事","聊天","家人","陪伴","吃饭","有意思的人"],attr:"CHA",base:1},
    {kw:["冥想","反思","日记","思考","心态","感悟","独处","哲学","情绪","放松","正念","复盘","感恩"],attr:"MND",base:1},
  ];
  const results=[], matched=new Set();
  rules.forEach(r=>{r.kw.forEach(k=>{if(text.includes(k)&&!matched.has(r.attr)){matched.add(r.attr);results.push({action:k,attr:r.attr,points:text.length>50?r.base+1:r.base});}});});
  if(!results.length) results.push({action:"记录生活",attr:"MND",points:1});
  return results;
}

function generateStory(classId, results, diary) {
  const main = results.reduce((a,b)=>b.points>a.points?b:a, results[0]).attr;
  const ts = STORY_TEMPLATES[main];
  const t = ts[Math.floor(Math.random()*ts.length)];
  const cls = CLASSES.find(c=>c.id===classId)||CLASSES[0];
  let extra="";
  if(diary.includes("朋友")||diary.includes("同事")) extra="身旁的伙伴们也一同见证了这个时刻。冒险永远不是一个人的旅程。";
  else if(diary.includes("学")||diary.includes("课")) extra="新获得的知识在脑海中慢慢沉淀，距离成为真正的大师又近了一步。";
  else if(diary.includes("运动")||diary.includes("跑")) extra="身体里涌动的力量似乎又强了一些，明天的修行一定会更加得心应手。";
  return {
    title: cls.name+"的冒险日志",
    text: `${t.s}，这位年轻的${cls.name}${t.a}。\n\n${t.d}。\n\n${extra?extra+"\n\n":""}今日的冒险又为这段传奇增添了新的一页。夜幕降临时，${cls.name}在日志上郑重记下了今天的收获，嘴角不自觉地扬起了微笑。`
  };
}

function QuizScreen({onComplete,mbtiBias}) {
  const [step,setStep]=useState(0);
  const [scores,setScores]=useState({INT:0,COU:0,VIT:0,CRE:0,CHA:0,MND:0,...(mbtiBias||{})});
  const [fade,setFade]=useState(true);
  const q=QUESTIONS[step];
  const handle=(bias)=>{
    const ns={...scores};Object.entries(bias).forEach(([k,v])=>{ns[k]+=v;});
    setFade(false);
    setTimeout(()=>{
      if(step<QUESTIONS.length-1){setStep(step+1);setScores(ns);setFade(true);}
      else{
        let best=CLASSES[0],bestS=-1;
        CLASSES.forEach(c=>{let s=0;Object.entries(c.baseStats).forEach(([k,v])=>{s+=v*(ns[k]||0);});if(s>bestS){bestS=s;best=c;}});
        onComplete(best);
      }
    },300);
  };
  return React.createElement("div",{style:{padding:"36px 20px",opacity:fade?1:0,transition:"opacity 0.3s"}},
    React.createElement("div",{style:{textAlign:"center",marginBottom:28}},
      React.createElement("span",{style:{fontSize:12,color:T.textSoft}},step+1," / ",QUESTIONS.length),
      React.createElement("div",{style:{display:"flex",gap:6,justifyContent:"center",margin:"10px 0 0"}},
        QUESTIONS.map((_,i)=>React.createElement("div",{key:i,style:{width:48,height:4,borderRadius:2,background:i<=step?T.pink:T.border,transition:"background 0.3s"}}))
      )

    React.createElement("h2",{style:{fontSize:19,fontWeight:700,color:T.text,textAlign:"center",margin:"0 0 28px",lineHeight:1.5}},q.q),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      q.opts.map((opt,i)=>React.createElement("button",{key:i,onClick:()=>handle(opt.bias),style:{
        padding:"16px 18px",fontSize:15,textAlign:"left",lineHeight:1.4,fontFamily:"inherit",

            React.createElement("div",{style:{flex:1,minWidth:0}},
              React.createElement("div",{style:{fontSize:13,fontWeight:600,color:purchased.has(i)?T.textLight:T.text}},item.name,purchased.has(i)?" ✓":""),
              React.createElement("div",{style:{fontSize:11,color:T.textSoft}},item.desc)
            ),
            React.createElement("button",{onClick:()=>{if(can){setCoins(c=>c-item.price);setPurchased(p=>new Set([...p,i]));}},disabled:!can,
              style:{padding:"5px 12px",fontSize:12,fontWeight:700,fontFamily:"inherit",
                background:can?`${T.yellow}22`:T.bgSoft,color:can?T.yellow:T.textLight,
                border:`1px solid ${can?`${T.yellow}44`:T.border}`,borderRadius:8,cursor:can?"pointer":"default",whiteSpace:"nowrap"
              }},"🪙",item.price)
          );
        })
      )
    )
  );
}

// ============ APP ============
function App() {
  const [screen,setScreen]=useState("welcome");
  const [mbti,setMbti]=useState(null);
  const [character,setCharacter]=useState(null);
  const [look,setLook]=useState({skin:SKIN_COLORS[0],hair:HAIR_COLORS[0],accessory:"none"});
  const [stats,setStats]=useState({});
  const [coins,setCoins]=useState(0);
  const [streak,setStreak]=useState(0);
  const [diaries,setDiaries]=useState([]);

  return React.createElement("div",null,
    screen==="welcome"&&React.createElement(WelcomeScreen,{onStart:()=>setScreen("mbti")}),
    screen==="mbti"&&React.createElement(MBTIScreen,{onNext:m=>{setMbti(m);setScreen("quiz");}}),
    screen==="quiz"&&React.createElement(QuizScreen,{mbtiBias:mbti?MBTI_BIAS[mbti]:null,onComplete:cls=>{setCharacter(cls);setStats({...cls.baseStats});setScreen("customize");}}),
    screen==="customize"&&character&&React.createElement(CustomizeScreen,{classInfo:character,onConfirm:lk=>{setLook(lk);setScreen("main");}}),
    screen==="main"&&character&&React.createElement(MainScreen,{character,look,stats,setStats,coins,setCoins,streak,setStreak,diaries,setDiaries})
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
